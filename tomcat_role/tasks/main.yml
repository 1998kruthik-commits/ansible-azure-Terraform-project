---
- name: Install Java
  apt:
    name: openjdk-17-jdk
    state: present
    update_cache: yes

- name: Download Tomcat
  get_url:
    url: "https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.89/bin/apache-tomcat-9.0.89.tar.gz"
    dest: /tmp/tomcat.tar.gz

- name: Create Tomcat Directory
  file:
    path: "{{ tomcat_dir }}"
    state: directory

- name: Extract Tomcat
  unarchive:
    src: /tmp/tomcat.tar.gz
    dest: "{{ tomcat_dir }}"
    remote_src: yes
    extra_opts:
      - --strip-components=1

- name: Copy WAR File
  copy:
    src: Amazon.war
    dest: "{{ tomcat_dir }}/webapps/Amazon.war"

- name: Start Tomcat
  shell: "{{ tomcat_dir }}/bin/startup.sh"
